<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль · 30 Days</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1 class="page-title">Профиль</h1>
        </header>

        <main class="main-content" id="profileContent">
            <div class="profile-header glass-card">
                <div class="profile-avatar">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4Z" fill="currentColor"/>
                    </svg>
                </div>
                <div class="profile-info">
                    <h2>Исследователь</h2>
                    <p>Участник с 2024 года</p>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card glass-card">
                    <div class="stat-value" id="totalDays">0</div>
                    <div class="stat-label">Дней пройдено</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-value" id="completedCourses">0</div>
                    <div class="stat-label">Курсов завершено</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-label">Дней подряд</div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-value" id="accuracy">0%</div>
                    <div class="stat-label">Точность</div>
                </div>
            </div>

            <div class="recent-activity">
                <h3>Недавняя активность</h3>
                <div class="activity-list" id="activityList">
                    <!-- Динамическая загрузка -->
                </div>
            </div>

            <div class="achievements-section">
                <h3>Достижения</h3>
                <div class="achievements-grid" id="achievements">
                    <!-- Динамическая загрузка -->
                </div>
            </div>
        </main>

        <nav class="bottom-nav glass-nav">
            <a href="index.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 5.69L17 10.19V18H15V12H9V18H7V10.19L12 5.69ZM12 3L2 12H5V20H11V14H13V20H19V12H22L12 3Z" fill="currentColor"/>
                </svg>
                <span>Главная</span>
            </a>
            <a href="active.html" class="nav-item">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M19 8H17V6C17 3.24 14.76 1 12 1S7 3.24 7 6v2H5c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2ZM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6Zm8 10h-3v3h-4v-3H7v-2h3v-3h4v3h3v2Z" fill="currentColor"/>
                </svg>
                <span>Активные</span>
            </a>
            <a href="profile.html" class="nav-item active">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4Zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4Z" fill="currentColor"/>
                </svg>
                <span>Профиль</span>
            </a>
        </nav>
    </div>

    <script src="js/dataLoader.js"></script>
    <script src="js/progressManager.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
