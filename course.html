<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>День 1 · 30 Days</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div class="app-container">
        <header class="course-header">
            <button class="back-btn" onclick="history.back()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/>
                </svg>
            </button>
            <div class="course-progress">
                <div class="progress-text">День <span id="currentDay">1</span>/<span id="totalDays">30</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 3.33%"></div>
                </div>
            </div>
        </header>

        <main class="course-content" id="courseContent">
            <!-- Динамическая загрузка контента дня -->
        </main>

        <footer class="course-footer">
            <button class="btn-primary" id="completeDayBtn" disabled>Отметить как пройденное</button>
        </footer>
    </div>

    <script src="js/dataLoader.js"></script>
    <script src="js/progressManager.js"></script>
    <script src="js/courseRenderer.js"></script>
    <script src="js/course.js"></script>
</body>
</html>
